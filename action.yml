name: Markup AI Content Guardian
description: GitHub Action that automates content quality checks via the Markup AI
  style agent, with risk-based or numeric scoring on every push, PR, and scheduled run.
author: Markup AI

branding:
  icon: shield
  color: black

inputs:
  markup_ai_api_key:
    description: Markup AI API key (can also be provided via the MARKUP_AI_API_KEY
      environment variable).
    required: true
  target:
    description: "Style guide to analyze against. Accepts either a target ID
      or the display name of an enabled target (case-insensitive). When
      omitted, the action uses the organization's default target (the one
      flagged `is_default: true` in /style-agent/targets)."
    required: false
  paths:
    description: "Optional whitelist of repo-relative paths to analyze. When
      set, the discovered file list is intersected with this whitelist; only
      matching files are sent to the style agent. Accepts comma- or
      newline-separated values, e.g. `README.md` or a multi-line YAML block
      listing several paths. Empty means analyze every discovered file
      (default)."
    required: false
  github_token:
    description: GitHub token for API access (can also be provided via the GITHUB_TOKEN
      environment variable).
    required: true
  add_commit_status:
    description: Add commit status updates for push events (default true).
    required: false
    default: "true"
  add_review_comments:
    description: Add PR review comments for issues (default true).
    required: false
    default: "true"
  strict_mode:
    description: Fail the action if any file fails analysis (default false).
    required: false
    default: "false"
  dry_run:
    description: "When true, the action performs the full analysis and emits
      `outputs.results` JSON as usual, but skips every write to GitHub: no
      PR comments, no inline reviews, no commit status, no job summary. The
      rendered markdown is logged so the result is observable. Useful for
      self-testing the action without polluting a PR."
    required: false
    default: "false"

outputs:
  event-type:
    description: GitHub event type that triggered the action.
  files-analyzed:
    description: Number of files analyzed.
  results:
    description: JSON string containing analysis results.

runs:
  using: node24
  main: dist/index.js
