name: Markup AI Content Guardian
description: GitHub Action that automates content quality checks via the Markup AI
  style agent, with risk-based or numeric scoring on every push, PR, and scheduled run.
author: Markup AI

branding:
  icon: shield
  color: black

inputs:
  markup_ai_api_key:
    description: Markup AI API key (can also be provided via the MARKUP_AI_API_KEY
      environment variable).
    required: true
  target:
    description: Style guide to analyze against. Accepts either a target ID
      or the display name of an enabled target (case-insensitive). When
      omitted, the action uses the organization's default target (the one
      flagged `is_default: true` in /style-agent/targets).
    required: false
  github_token:
    description: GitHub token for API access (can also be provided via the GITHUB_TOKEN
      environment variable).
    required: true
  add_commit_status:
    description: Add commit status updates for push events (default true).
    required: false
    default: "true"
  add_review_comments:
    description: Add PR review comments for issues (default true).
    required: false
    default: "true"
  strict_mode:
    description: Fail the action if any file fails analysis (default false).
    required: false
    default: "false"

outputs:
  event-type:
    description: GitHub event type that triggered the action.
  files-analyzed:
    description: Number of files analyzed.
  results:
    description: JSON string containing analysis results.

runs:
  using: node24
  main: dist/index.js
