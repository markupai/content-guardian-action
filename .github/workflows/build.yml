name: Continuous Integration

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Check Formatting
        run: npm run format:check

      - name: Run type check
        run: npm run type-check

      - name: Run Lint check
        run: npm run lint:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # End-to-end test of the action against itself. Scoped via the `paths`
  # input to README.md so it touches one file at most per run — keeps PR
  # noise low while still exercising the real wire path against the live
  # Markup AI API.
  github-action-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        uses: ./
        with:
          # `dry_run: true` runs the full analysis (config, target resolve,
          # /run, polling) and emits `outputs.results` JSON to the run log,
          # but skips every GitHub-side write — no PR comments, no inline
          # reviews, no commit status. Keeps this job pollution-free while
          # still exercising the live wire path.
          # `paths: README.md` and `add_review_comments: false` are redundant
          # under dry-run but kept as belt-and-suspenders.
          dry_run: "true"
          add_review_comments: "false"
          paths: README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARKUP_AI_API_KEY: ${{ secrets.MARKUP_AI_API_KEY_PROD }}
